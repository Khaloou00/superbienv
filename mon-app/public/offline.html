<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hors ligne — SUPERBIENV</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0a0a0a;
        color: #fff;
        font-family: Inter, system-ui, sans-serif;
        padding: 24px;
      }
      .card {
        text-align: center;
        max-width: 360px;
        width: 100%;
      }
      .logo {
        font-size: 28px;
        font-weight: 900;
        color: #F5C518;
        letter-spacing: -0.5px;
        margin-bottom: 8px;
      }
      .sub {
        font-size: 12px;
        color: #A0A0A0;
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 40px;
      }
      .icon {
        width: 72px;
        height: 72px;
        border-radius: 50%;
        background: rgba(245,197,24,0.08);
        border: 1px solid rgba(245,197,24,0.2);
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 24px;
      }
      .icon svg { width: 32px; height: 32px; stroke: #F5C518; }
      h1 {
        font-size: 20px;
        font-weight: 700;
        margin-bottom: 12px;
        color: #fff;
      }
      p {
        font-size: 14px;
        color: #A0A0A0;
        line-height: 1.6;
        margin-bottom: 32px;
      }
      button {
        background: #F5C518;
        color: #0a0a0a;
        border: none;
        border-radius: 12px;
        padding: 14px 32px;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        font-family: inherit;
        transition: opacity 0.2s;
      }
      button:hover { opacity: 0.85; }
      button:active { transform: scale(0.97); }
    </style>
  </head>
  <body>
    <div class="card">
      <p class="logo">SUPERBIENV</p>
      <p class="sub">Drive-In Cinéma</p>
      <div class="icon">
        <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M3.375 19.5h17.25m-17.25 0a1.125 1.125 0 01-1.125-1.125M3.375 19.5h1.5C5.496 19.5 6 18.996 6 18.375m-3.75.125V5.625m0 12.375C3.375 18.996 3.879 19.5 4.5 19.5M4.5 5.625C4.5 5.004 3.996 4.5 3.375 4.5m0 1.125A1.125 1.125 0 014.5 4.5M4.5 5.625v12.75M4.5 4.5h15m0 0c.621 0 1.125.504 1.125 1.125M19.5 4.5v1.125M19.5 18.375c0 .621-.504 1.125-1.125 1.125M19.5 18.375V5.625m0 12.75c0 .621.504 1.125 1.125 1.125m0-15a1.125 1.125 0 011.125 1.125M20.625 18.375h-1.5c-.621 0-1.125-.504-1.125-1.125" />
        </svg>
      </div>
      <h1>Vous êtes hors ligne</h1>
      <p>Vérifiez votre connexion internet et réessayez.</p>
      <button onclick="window.location.reload()">Réessayer</button>
    </div>
  </body>
</html>
